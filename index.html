<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive One - Governança Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'https://esm.sh/react@18.3.1';
      import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
      import {
        Building2,
        Layers,
        Handshake,
        Mail,
        Lock,
        LogOut,
        Menu,
        X,
        LayoutDashboard,
        FolderKanban,
        BarChart3,
        CheckCircle,
        Calendar,
        BookOpen,
        FileText,
        ThumbsUp,
        Briefcase,
        AlertTriangle,
        Users,
        Shield,
        TrendingUp,
        Link as LinkIcon,
        Package,
        Activity,
        MessageSquare,
        ChevronRight,
      } from 'https://esm.sh/lucide-react@0.468.0?deps=react@18.3.1';

      // --- CONFIGURAÇÕES DE CONTEÚDO DA HOME ---

      const homeContentConfig = {
        cliente: {
          welcomeMessage: 'Você está acessando a visão do cliente.',
          cards: [
            { title: 'Meus Projetos', icon: FolderKanban, color: 'text-blue-600', bg: 'bg-blue-100' },
            { title: 'Status Report', icon: BarChart3, color: 'text-indigo-600', bg: 'bg-indigo-100' },
            { title: 'Pendências do Cliente', icon: CheckCircle, color: 'text-amber-600', bg: 'bg-amber-100' },
            { title: 'Cronograma', icon: Calendar, color: 'text-emerald-600', bg: 'bg-emerald-100' },
            { title: 'Treinamentos', icon: BookOpen, color: 'text-purple-600', bg: 'bg-purple-100' },
            { title: 'Documentos', icon: FileText, color: 'text-slate-600', bg: 'bg-slate-100' },
            { title: 'Aprovações', icon: ThumbsUp, color: 'text-teal-600', bg: 'bg-teal-100' },
          ],
        },
        totvs: {
          welcomeMessage: 'Você está acessando a visão TOTVS.',
          cards: [
            { title: 'Portfólio de Projetos', icon: Briefcase, color: 'text-blue-600', bg: 'bg-blue-100' },
            { title: 'Cockpit Executivo', icon: LayoutDashboard, color: 'text-violet-600', bg: 'bg-violet-100' },
            { title: 'Status Report', icon: BarChart3, color: 'text-indigo-600', bg: 'bg-indigo-100' },
            { title: 'Riscos', icon: AlertTriangle, color: 'text-red-600', bg: 'bg-red-100' },
            { title: 'Pendências', icon: CheckCircle, color: 'text-amber-600', bg: 'bg-amber-100' },
            { title: 'Times de Implantação', icon: Users, color: 'text-cyan-600', bg: 'bg-cyan-100' },
            { title: 'Governança AGF', icon: Shield, color: 'text-emerald-600', bg: 'bg-emerald-100' },
            { title: 'Indicadores', icon: TrendingUp, color: 'text-fuchsia-600', bg: 'bg-fuchsia-100' },
          ],
        },
        parceiro: {
          welcomeMessage: 'Você está acessando a visão do parceiro.',
          cards: [
            { title: 'Projetos Vinculados', icon: LinkIcon, color: 'text-blue-600', bg: 'bg-blue-100' },
            { title: 'Entregáveis', icon: Package, color: 'text-indigo-600', bg: 'bg-indigo-100' },
            { title: 'Agendas', icon: Calendar, color: 'text-emerald-600', bg: 'bg-emerald-100' },
            { title: 'Pendências', icon: CheckCircle, color: 'text-amber-600', bg: 'bg-amber-100' },
            { title: 'Documentos', icon: FileText, color: 'text-slate-600', bg: 'bg-slate-100' },
            { title: 'Status da Frente', icon: Activity, color: 'text-rose-600', bg: 'bg-rose-100' },
            { title: 'Comunicação', icon: MessageSquare, color: 'text-sky-600', bg: 'bg-sky-100' },
          ],
        },
      };

      const profileNames = {
        cliente: 'Cliente',
        totvs: 'TOTVS',
        parceiro: 'Parceiro',
      };

      // --- COMPONENTES DA TELA DE LOGIN ---

      const ProfileCard = ({ id, title, icon: Icon, selectedProfile, onClick }) => {
        const isSelected = selectedProfile === id;

        return (
          <div
            onClick={() => onClick(id)}
            className={`cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all duration-200
              ${isSelected
                ? 'border-blue-600 bg-blue-50 shadow-md transform -translate-y-1'
                : 'border-slate-200 bg-white hover:border-blue-300 hover:bg-slate-50'}`}
          >
            <Icon className={`w-8 h-8 mb-3 ${isSelected ? 'text-blue-600' : 'text-slate-500'}`} />
            <span className={`font-medium text-sm text-center ${isSelected ? 'text-blue-800' : 'text-slate-700'}`}>
              {title}
            </span>
          </div>
        );
      };

      const LoginPage = ({ onLoginSuccess }) => {
        const [selectedProfile, setSelectedProfile] = useState(null);
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [errorMessage, setErrorMessage] = useState('');

        const handleLogin = (event) => {
          event.preventDefault();
          setErrorMessage('');

          if (!selectedProfile) {
            setErrorMessage('Por favor, selecione seu perfil de acesso acima.');
            return;
          }

          if (!email || !password) {
            setErrorMessage('Por favor, preencha seu e-mail e senha.');
            return;
          }

          // Simulação de delay de rede
          setTimeout(() => {
            onLoginSuccess(selectedProfile);
          }, 500);
        };

        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex flex-col justify-center items-center p-4">
            <div className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
              {/* Header do Login */}
              <div className="bg-slate-900 p-8 text-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-full bg-blue-600 opacity-10"></div>
                <h1 className="text-3xl font-bold text-white relative z-10 flex items-center justify-center gap-2">
                  <LayoutDashboard className="w-8 h-8 text-blue-400" />
                  Adaptive One
                </h1>
                <p className="text-slate-300 mt-2 text-sm relative z-10">Governança Inteligente</p>
              </div>

              {/* Corpo do Login */}
              <div className="p-8">
                <div className="text-center mb-6">
                  <h2 className="text-xl font-bold text-slate-800">Acesse sua jornada de implantação</h2>
                  <p className="text-sm text-slate-500 mt-1">Escolha seu perfil de acesso para continuar</p>
                </div>

                <div className="grid grid-cols-3 gap-3 mb-8">
                  <ProfileCard
                    id="cliente"
                    title="Eu sou Cliente"
                    icon={Building2}
                    selectedProfile={selectedProfile}
                    onClick={setSelectedProfile}
                  />
                  <ProfileCard
                    id="totvs"
                    title="Eu sou TOTVS"
                    icon={Layers}
                    selectedProfile={selectedProfile}
                    onClick={setSelectedProfile}
                  />
                  <ProfileCard
                    id="parceiro"
                    title="Eu sou Parceiro"
                    icon={Handshake}
                    selectedProfile={selectedProfile}
                    onClick={setSelectedProfile}
                  />
                </div>

                <form onSubmit={handleLogin} className="space-y-4">
                  {errorMessage && (
                    <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100">
                      {errorMessage}
                    </div>
                  )}

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">E-mail corporativo</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Mail className="h-5 w-5 text-slate-400" />
                      </div>
                      <input
                        type="email"
                        className="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm transition-colors"
                        placeholder="seu.nome@empresa.com"
                        value={email}
                        onChange={(event) => setEmail(event.target.value)}
                      />
                    </div>
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <label className="block text-sm font-medium text-slate-700">Senha</label>
                      <a href="#" className="text-xs text-blue-600 hover:text-blue-800 font-medium">Esqueci minha senha</a>
                    </div>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Lock className="h-5 w-5 text-slate-400" />
                      </div>
                      <input
                        type="password"
                        className="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm transition-colors"
                        placeholder="••••••••"
                        value={password}
                        onChange={(event) => setPassword(event.target.value)}
                      />
                    </div>
                  </div>

                  <button
                    type="submit"
                    disabled={!selectedProfile}
                    className={`w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white transition-all duration-200 mt-6
                      ${!selectedProfile
                        ? 'bg-slate-300 cursor-not-allowed'
                        : 'bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500'}`}
                  >
                    Conectar
                  </button>
                </form>
              </div>

              {/* Rodapé */}
              <div className="bg-slate-50 py-4 text-center border-t border-slate-100">
                <p className="text-xs text-slate-500">© 2026 Adaptive One - Governança de Projetos</p>
              </div>
            </div>
          </div>
        );
      };

      // --- COMPONENTES DA TELA HOME ---

      const DashboardCard = ({ title, icon: Icon, color, bg }) => (
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer group flex flex-col h-full">
          <div className={`w-12 h-12 rounded-lg ${bg} flex items-center justify-center mb-4 group-hover:scale-110 transition-transform`}>
            <Icon className={`w-6 h-6 ${color}`} />
          </div>
          <h3 className="text-slate-800 font-semibold mb-2">{title}</h3>
          <div className="mt-auto flex items-center text-sm font-medium text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity">
            Acessar módulo <ChevronRight className="w-4 h-4 ml-1" />
          </div>
        </div>
      );

      const SidebarItem = ({ icon: Icon, label, active }) => (
        <a href="#" className={`flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${active ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
          <Icon className={`w-5 h-5 ${active ? 'text-blue-600' : 'text-slate-400'}`} />
          <span>{label}</span>
        </a>
      );

      const Sidebar = ({ isOpen, onClose, profile }) => {
        const sidebarCards = homeContentConfig[profile]?.cards ?? homeContentConfig.cliente.cards;

        return (
          <>
            {/* Overlay mobile */}
            {isOpen && (
              <div
                className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden"
                onClick={onClose}
              />
            )}

            {/* Sidebar */}
            <aside className={`fixed top-0 left-0 h-full bg-white w-64 border-r border-slate-200 z-50 transform transition-transform duration-300 lg:translate-x-0 ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
              <div className="h-16 flex items-center px-6 border-b border-slate-200 justify-between lg:justify-center">
                <div className="flex items-center gap-2">
                  <LayoutDashboard className="w-6 h-6 text-blue-600" />
                  <span className="font-bold text-slate-900 text-lg">Adaptive One</span>
                </div>
                <button className="lg:hidden text-slate-500 hover:text-slate-700" onClick={onClose}>
                  <X className="w-5 h-5" />
                </button>
              </div>

              <div className="p-4">
                <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 px-4">Menu Principal</div>
                <nav className="space-y-1">
                  <SidebarItem icon={LayoutDashboard} label="Home" active={true} />
                  {/* Renderização de itens de menu simplificada para o exemplo */}
                  {sidebarCards.slice(0, 4).map((card, index) => (
                    <SidebarItem key={index} icon={card.icon} label={card.title} />
                  ))}
                </nav>

                <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-8 mb-4 px-4">Sistema</div>
                <nav className="space-y-1">
                  <SidebarItem icon={Shield} label="Configurações" />
                </nav>
              </div>
            </aside>
          </>
        );
      };

      const Header = ({ onOpenSidebar, onLogout, profile }) => (
        <header className="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 sticky top-0 z-30">
          <div className="flex items-center gap-4">
            <button
              onClick={onOpenSidebar}
              className="p-2 rounded-md text-slate-500 hover:bg-slate-100 lg:hidden"
            >
              <Menu className="w-5 h-5" />
            </button>
            <h2 className="text-xl font-semibold text-slate-800 hidden sm:block">Painel Principal</h2>
          </div>

          <div className="flex items-center gap-4">
            <div className="hidden md:flex items-center gap-3 pr-4 border-r border-slate-200">
              <div className="text-right">
                <p className="text-sm font-medium text-slate-700">Usuário Logado</p>
                <p className="text-xs text-slate-500">Perfil: {profileNames[profile]}</p>
              </div>
              <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold">
                {profileNames[profile].charAt(0)}
              </div>
            </div>
            <button
              onClick={onLogout}
              className="flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-red-600 transition-colors p-2 rounded-lg hover:bg-red-50"
            >
              <LogOut className="w-4 h-4" />
              <span className="hidden sm:inline">Sair</span>
            </button>
          </div>
        </header>
      );

      const HomePage = ({ profile, onLogout }) => {
        const [isSidebarOpen, setIsSidebarOpen] = useState(false);
        const content = homeContentConfig[profile] || homeContentConfig.cliente;

        return (
          <div className="min-h-screen bg-slate-50 flex">
            <Sidebar
              isOpen={isSidebarOpen}
              onClose={() => setIsSidebarOpen(false)}
              profile={profile}
            />

            <div className="flex-1 lg:ml-64 flex flex-col min-h-screen transition-all duration-300">
              <Header
                onOpenSidebar={() => setIsSidebarOpen(true)}
                onLogout={onLogout}
                profile={profile}
              />

              <main className="flex-1 p-6 sm:p-8 max-w-7xl w-full mx-auto">
                {/* Banner de Boas-vindas */}
                <div className="bg-slate-900 rounded-2xl p-8 mb-8 text-white relative overflow-hidden shadow-lg">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 -translate-y-1/2 translate-x-1/2"></div>
                  <div className="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 translate-y-1/2 -translate-x-1/2"></div>

                  <div className="relative z-10">
                    <span className="inline-block px-3 py-1 bg-blue-500/20 text-blue-200 text-xs font-semibold rounded-full mb-4 border border-blue-400/30">
                      {content.welcomeMessage}
                    </span>
                    <h1 className="text-3xl sm:text-4xl font-bold mb-3">Bem-vindo ao Adaptive One</h1>
                    <p className="text-slate-300 max-w-2xl text-lg">
                      Governança inteligente para acompanhar projetos, entregas, riscos e evolução operacional.
                    </p>
                  </div>
                </div>

                {/* Grid de Cards Dinâmico */}
                <div className="mb-6 flex items-center justify-between">
                  <h2 className="text-lg font-bold text-slate-800">Módulos em destaque</h2>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                  {content.cards.map((card, index) => (
                    <DashboardCard key={index} {...card} />
                  ))}
                </div>
              </main>
            </div>
          </div>
        );
      };

      // --- COMPONENTE PRINCIPAL (APP / GERENCIADOR DE ROTAS) ---

      function App() {
        const [currentRoute, setCurrentRoute] = useState('login'); // 'login' | 'home'
        const [profile, setProfile] = useState(null);
        const [isInitializing, setIsInitializing] = useState(true);

        // Efeito executado na montagem para checar o localStorage
        useEffect(() => {
          const savedProfile = localStorage.getItem('accessProfile');
          if (savedProfile) {
            setProfile(savedProfile);
            setCurrentRoute('home');
          } else {
            setCurrentRoute('login');
          }
          setIsInitializing(false);
        }, []);

        const handleLoginSuccess = (selectedProfile) => {
          localStorage.setItem('accessProfile', selectedProfile);
          setProfile(selectedProfile);
          setCurrentRoute('home');
        };

        const handleLogout = () => {
          localStorage.removeItem('accessProfile');
          setProfile(null);
          setCurrentRoute('login');
        };

        if (isInitializing) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-50">
              <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>
          );
        }

        // Roteamento baseado em estado simulando as rotas /login e /home
        return (
          <>
            {currentRoute === 'login' && (
              <LoginPage onLoginSuccess={handleLoginSuccess} />
            )}

            {currentRoute === 'home' && profile && (
              <HomePage profile={profile} onLogout={handleLogout} />
            )}
          </>
        );
      }

      createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
